apiVersion: apps/v1
kind: Deployment
metadata:
  name: remote-job-launcher
  namespace: default # Or your preferred namespace in Cluster A
  labels:
    app: remote-job-launcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: remote-job-launcher
  template:
    metadata:
      labels:
        app: remote-job-launcher
    spec:
      serviceAccountName: remote-job-launcher-sa # Specify the service account
      containers:
      - name: launcher
        image: YOUR_DOCKER_REGISTRY/remote-job-launcher:latest # <-- IMPORTANT: Replace with your image URI
        args:
          # Common arguments
          - "--target-cluster-name"
          - "my-eks-cluster-b" # Example: Name of the target EKS cluster
          - "--job-image"
          - "busybox"
          - "--job-namespace"
          - "default"

          # --- IRSA Auth Method Example ---
          - "--auth-method"
          - "irsa"
          - "--target-cluster-region"
          - "us-west-2" # Example: AWS Region of the target EKS cluster
          # Optional: Provide if Cluster B is in a different AWS account or you need to assume a specific role in Cluster B's account
          # This role (ClusterBJobExecutionRole) must trust ClusterALauncherRole for assumption.
          # - "--target-eks-role-arn"
          # - "arn:aws:iam::CLUSTER_B_AWS_ACCOUNT_ID:role/ClusterBJobExecutionRole" # <-- UPDATE THIS (if using)

          # --- Kubeconfig Auth Method Example (Mutually exclusive with IRSA for a given invocation) ---
          # If using kubeconfig method, uncomment these and comment out IRSA args:
          # - "--auth-method"
          # - "kubeconfig"
          # - "--kubeconfig-base-path" # Default is /etc/kubeconfigs, can be omitted if default is used
          # - "/etc/kubeconfigs"

        # Volume mount for kubeconfig (only needed if using --auth-method kubeconfig)
        # If exclusively using IRSA for all targets, this volumeMount and the volume can be removed.
        volumeMounts:
        - name: kubeconfigs
          mountPath: "/etc/kubeconfigs" # Path used by --kubeconfig-base-path
          readOnly: true

      # Volume for kubeconfig (only needed if using --auth-method kubeconfig)
      # If exclusively using IRSA, this can be removed.
      volumes:
      - name: kubeconfigs
        secret:
          # The secretName should contain a key that matches the --target-cluster-name
          # when using the 'kubeconfig' auth method. E.g. a key 'my-other-cluster'
          # for '--target-cluster-name my-other-cluster'.
          secretName: other-cluster-kubeconfig # Example: if you have a non-EKS cluster or an EKS with static IAM user kubeconfig
          optional: true # Make the secret optional if IRSA is the primary method and this is only for specific cases.
                         # If set to false (default) and secret doesn't exist, pod will fail to start.

      # SecurityContext for the pod. fsGroup might be needed for kubeconfig file readability if appuser (UID 1000)
      # does not have permissions on the mounted secret files by default.
      # For IRSA, this is not directly relevant to AWS auth, but general pod security.
      # securityContext:
      #   fsGroup: 1000 # UID of appuser from Dockerfile
