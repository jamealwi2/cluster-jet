apiVersion: v1
kind: ServiceAccount
metadata:
  name: remote-job-launcher-sa
  namespace: default # Or your preferred namespace in Cluster A
  labels:
    app: remote-job-launcher
  # Annotations for IRSA (IAM Roles for Service Accounts)
  # Replace YOUR_AWS_ACCOUNT_ID and ClusterALauncherRole with your specific values.
  # This role (ClusterALauncherRole) must be created in AWS IAM and have a trust relationship
  # with this Service Account.
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::YOUR_AWS_ACCOUNT_ID:role/ClusterALauncherRole # <-- UPDATE THIS
